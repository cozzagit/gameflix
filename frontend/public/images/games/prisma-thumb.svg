<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#0d0d2a"/>
    </linearGradient>
    <linearGradient id="prismFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,50,50,0.3)"/>
      <stop offset="33%" stop-color="rgba(50,255,50,0.3)"/>
      <stop offset="67%" stop-color="rgba(50,50,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(200,50,255,0.3)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="beamGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(60,60,120,0.15)" stroke-width="0.5">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>

  <!-- Incoming white beam -->
  <line x1="30" y1="150" x2="170" y2="150" stroke="white" stroke-width="4" opacity="0.9" filter="url(#beamGlow)"/>
  <line x1="30" y1="150" x2="170" y2="150" stroke="white" stroke-width="2" opacity="0.6"/>

  <!-- Light source circle -->
  <circle cx="30" cy="150" r="12" fill="white" opacity="0.8" filter="url(#glow)"/>
  <circle cx="30" cy="150" r="5" fill="white" opacity="1"/>

  <!-- Prism -->
  <polygon points="190,90 155,210 225,210" fill="url(#prismFill)" stroke="rgba(200,220,255,0.8)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Split beams -->
  <!-- Red beam going up-right -->
  <line x1="190" y1="140" x2="350" y2="60" stroke="#ff3333" stroke-width="3.5" opacity="0.85" filter="url(#beamGlow)"/>
  <line x1="190" y1="140" x2="350" y2="60" stroke="#ff6666" stroke-width="1.5" opacity="0.5"/>

  <!-- Green beam going right -->
  <line x1="210" y1="160" x2="370" y2="160" stroke="#33ff33" stroke-width="3.5" opacity="0.85" filter="url(#beamGlow)"/>
  <line x1="210" y1="160" x2="370" y2="160" stroke="#66ff66" stroke-width="1.5" opacity="0.5"/>

  <!-- Blue beam going down-right -->
  <line x1="195" y1="185" x2="350" y2="250" stroke="#3333ff" stroke-width="3.5" opacity="0.85" filter="url(#beamGlow)"/>
  <line x1="195" y1="185" x2="350" y2="250" stroke="#6666ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Target receptors -->
  <circle cx="350" cy="60" r="16" fill="none" stroke="#ff3333" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="350" cy="60" r="8" fill="#ff3333" opacity="0.7"/>

  <circle cx="370" cy="160" r="16" fill="none" stroke="#33ff33" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="370" cy="160" r="8" fill="#33ff33" opacity="0.7"/>

  <circle cx="350" cy="250" r="16" fill="none" stroke="#3333ff" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="350" cy="250" r="8" fill="#3333ff" opacity="0.7"/>

  <!-- Sparkle particles -->
  <circle cx="192" cy="142" r="2" fill="white" opacity="0.8"/>
  <circle cx="188" cy="138" r="1.5" fill="#ff6666" opacity="0.6"/>
  <circle cx="212" cy="158" r="2" fill="white" opacity="0.7"/>
  <circle cx="197" cy="187" r="1.5" fill="#6666ff" opacity="0.6"/>
</svg>
