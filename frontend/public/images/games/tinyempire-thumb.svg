<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <radialGradient id="teBg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="100%" stop-color="#0a140a"/>
    </radialGradient>
    <linearGradient id="teGround" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a7a3a"/>
      <stop offset="100%" stop-color="#2a4a1a"/>
    </linearGradient>
    <linearGradient id="teSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2040"/>
      <stop offset="40%" stop-color="#2a3060"/>
      <stop offset="100%" stop-color="#4a6080"/>
    </linearGradient>
    <linearGradient id="teWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a882"/>
      <stop offset="100%" stop-color="#8a7050"/>
    </linearGradient>
    <linearGradient id="teRoof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a04030"/>
      <stop offset="100%" stop-color="#702820"/>
    </linearGradient>
    <filter id="teShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="teGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="640" height="360" fill="url(#teSky)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.4">
    <circle cx="80" cy="30" r="1"/><circle cx="200" cy="50" r="1.2"/><circle cx="350" cy="25" r="0.8"/>
    <circle cx="500" cy="45" r="1"/><circle cx="560" cy="70" r="1.3"/><circle cx="140" cy="65" r="0.7"/>
    <circle cx="420" cy="35" r="1.1"/><circle cx="600" cy="30" r="0.9"/>
  </g>

  <!-- Moon -->
  <circle cx="520" cy="60" r="25" fill="#e8e0c8" opacity="0.3"/>
  <circle cx="520" cy="60" r="25" fill="none" stroke="#f0e8d0" stroke-width="0.5" opacity="0.5"/>
  <circle cx="528" cy="55" r="22" fill="url(#teSky)" opacity="0.7"/>

  <!-- Distant mountains -->
  <polygon points="0,200 80,140 160,170 240,120 320,160 400,110 480,150 560,130 640,180 640,220 0,220" fill="#1a3020" opacity="0.6"/>
  <polygon points="0,210 100,170 200,190 300,150 400,175 500,145 600,185 640,170 640,230 0,230" fill="#1a3520" opacity="0.5"/>

  <!-- Ground -->
  <rect x="0" y="220" width="640" height="140" fill="url(#teGround)"/>

  <!-- Isometric grid hint -->
  <g stroke="#5a9a4a" stroke-width="0.3" opacity="0.15">
    <line x1="100" y1="280" x2="300" y2="230"/><line x1="150" y1="300" x2="350" y2="250"/>
    <line x1="200" y1="320" x2="400" y2="270"/><line x1="300" y1="230" x2="500" y2="280"/>
    <line x1="350" y1="250" x2="550" y2="300"/>
  </g>

  <!-- Castle / Main building -->
  <g filter="url(#teShadow)" transform="translate(250, 180)">
    <!-- Base wall -->
    <rect x="0" y="20" width="140" height="80" fill="url(#teWall)" rx="2"/>
    <!-- Wall texture -->
    <g stroke="#7a6040" stroke-width="0.3" opacity="0.4">
      <line x1="0" y1="35" x2="140" y2="35"/><line x1="0" y1="50" x2="140" y2="50"/>
      <line x1="0" y1="65" x2="140" y2="65"/><line x1="0" y1="80" x2="140" y2="80"/>
    </g>
    <!-- Tower left -->
    <rect x="-10" y="-10" width="30" height="110" fill="#b09060" rx="1"/>
    <polygon points="-10,-10 5,-30 20,-10" fill="url(#teRoof)"/>
    <rect x="-2" y="-8" width="4" height="3" fill="#6a5030" rx="0.5"/>
    <rect x="8" y="-8" width="4" height="3" fill="#6a5030" rx="0.5"/>
    <!-- Tower right -->
    <rect x="120" y="-10" width="30" height="110" fill="#b09060" rx="1"/>
    <polygon points="120,-10 135,-30 150,-10" fill="url(#teRoof)"/>
    <rect x="128" y="-8" width="4" height="3" fill="#6a5030" rx="0.5"/>
    <rect x="138" y="-8" width="4" height="3" fill="#6a5030" rx="0.5"/>
    <!-- Main roof -->
    <polygon points="15,20 70,-15 125,20" fill="url(#teRoof)"/>
    <!-- Gate -->
    <rect x="55" y="55" width="30" height="45" fill="#4a3020" rx="15 15 0 0"/>
    <!-- Windows -->
    <rect x="20" y="35" width="12" height="15" fill="#2a3050" rx="1"/>
    <rect x="108" y="35" width="12" height="15" fill="#2a3050" rx="1"/>
    <!-- Window glow -->
    <rect x="21" y="36" width="10" height="13" fill="#ffa020" opacity="0.3" rx="1"/>
    <rect x="109" y="36" width="10" height="13" fill="#ffa020" opacity="0.3" rx="1"/>
    <!-- Flag -->
    <line x1="70" y1="-15" x2="70" y2="-40" stroke="#5a4030" stroke-width="1.5"/>
    <polygon points="70,-40 90,-35 70,-28" fill="#c03030"/>
  </g>

  <!-- Small houses -->
  <g filter="url(#teShadow)">
    <!-- House 1 -->
    <rect x="120" y="250" width="40" height="30" fill="#c0a070" rx="1"/>
    <polygon points="115,250 140,235 165,250" fill="#804030"/>
    <rect x="133" y="260" width="10" height="20" fill="#4a3020" rx="1"/>
    <!-- House 2 -->
    <rect x="440" y="240" width="45" height="35" fill="#b89868" rx="1"/>
    <polygon points="435,240 462,222 490,240" fill="#904838"/>
    <rect x="452" y="255" width="10" height="20" fill="#4a3020" rx="1"/>
    <rect x="470" y="248" width="8" height="10" fill="#2a3050" rx="1"/>
  </g>

  <!-- Trees -->
  <g>
    <!-- Tree 1 -->
    <rect x="78" y="240" width="4" height="20" fill="#5a4030"/>
    <circle cx="80" cy="232" r="14" fill="#2a6a2a"/>
    <circle cx="75" cy="236" r="10" fill="#1a5a1a"/>
    <!-- Tree 2 -->
    <rect x="518" y="235" width="4" height="22" fill="#5a4030"/>
    <circle cx="520" cy="226" r="16" fill="#2a7a2a"/>
    <circle cx="526" cy="230" r="12" fill="#1a6a1a"/>
    <!-- Tree 3 -->
    <rect x="568" y="250" width="3" height="16" fill="#5a4030"/>
    <circle cx="570" cy="244" r="10" fill="#2a6a2a"/>
  </g>

  <!-- Resource icons -->
  <g opacity="0.7">
    <!-- Wood pile -->
    <g transform="translate(180, 285)">
      <rect x="0" y="0" width="20" height="6" fill="#8a6030" rx="3"/>
      <rect x="2" y="-5" width="18" height="6" fill="#a07040" rx="3"/>
      <rect x="4" y="-10" width="14" height="6" fill="#b08050" rx="3"/>
    </g>
    <!-- Gold coin -->
    <circle cx="490" cy="290" r="8" fill="#daa520" stroke="#b8860b" stroke-width="1.5"/>
    <text x="490" y="294" text-anchor="middle" font-family="serif" font-size="10" font-weight="bold" fill="#8a6010">$</text>
  </g>

  <!-- Villager figures (tiny) -->
  <g>
    <circle cx="200" cy="275" r="3" fill="#e8c8a0"/><rect x="198" y="278" width="4" height="8" fill="#4060a0" rx="1"/>
    <circle cx="350" cy="290" r="3" fill="#e8c8a0"/><rect x="348" y="293" width="4" height="8" fill="#a06040" rx="1"/>
    <circle cx="410" cy="280" r="3" fill="#e8c8a0"/><rect x="408" y="283" width="4" height="8" fill="#608040" rx="1"/>
  </g>

  <!-- Sword icon (enemy raid hint) -->
  <g transform="translate(590, 230) rotate(-30)" opacity="0.5">
    <rect x="-2" y="-20" width="4" height="25" fill="#a0a0b0" rx="1"/>
    <rect x="-6" y="3" width="12" height="3" fill="#808090" rx="1"/>
    <rect x="-1" y="5" width="2" height="8" fill="#6a5030"/>
  </g>

  <!-- Title -->
  <text x="320" y="340" text-anchor="middle" font-family="'Georgia', serif" font-size="28" font-weight="bold" fill="#c8a060" opacity="0.9" filter="url(#teShadow)">TINY EMPIRE</text>

  <!-- Age indicator -->
  <text x="320" y="355" text-anchor="middle" font-family="'Georgia', serif" font-size="11" fill="#8a9a7a" opacity="0.6">Dall'Età della Pietra all'Era Moderna</text>
</svg>
