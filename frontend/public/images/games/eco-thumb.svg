<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#020208" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#020208"/>

  <!-- Central glow -->
  <circle cx="160" cy="150" r="180" fill="url(#glow1)"/>

  <!-- Sonar rings expanding from player position -->
  <circle cx="160" cy="150" r="40" fill="none" stroke="#06B6D4" stroke-width="2.5" opacity="0.7" filter="url(#blur2)"/>
  <circle cx="160" cy="150" r="85" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.45" filter="url(#blur2)"/>
  <circle cx="160" cy="150" r="140" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.25" filter="url(#blur2)"/>
  <circle cx="160" cy="150" r="200" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.1"/>

  <!-- Cave walls revealed by sonar (glowing segments) -->
  <!-- Top wall -->
  <line x1="60" y1="60" x2="200" y2="55" stroke="#06B6D4" stroke-width="3" opacity="0.8" filter="url(#blur1)"/>
  <line x1="60" y1="60" x2="200" y2="55" stroke="#06B6D4" stroke-width="1.5" opacity="0.9"/>

  <!-- Left wall -->
  <line x1="55" y1="65" x2="50" y2="200" stroke="#06B6D4" stroke-width="3" opacity="0.6" filter="url(#blur1)"/>
  <line x1="55" y1="65" x2="50" y2="200" stroke="#06B6D4" stroke-width="1.5" opacity="0.7"/>

  <!-- Bottom wall segment -->
  <line x1="50" y1="240" x2="180" y2="245" stroke="#06B6D4" stroke-width="3" opacity="0.5" filter="url(#blur1)"/>
  <line x1="50" y1="240" x2="180" y2="245" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>

  <!-- Right corridor walls -->
  <line x1="240" y1="110" x2="340" y2="115" stroke="#06B6D4" stroke-width="2" opacity="0.35" filter="url(#blur1)"/>
  <line x1="240" y1="190" x2="340" y2="185" stroke="#06B6D4" stroke-width="2" opacity="0.3" filter="url(#blur1)"/>

  <!-- Water wall (blue) -->
  <line x1="80" y1="205" x2="130" y2="235" stroke="#3B82F6" stroke-width="2.5" opacity="0.5" filter="url(#blur1)"/>

  <!-- Player (glowing cyan dot) -->
  <circle cx="160" cy="150" r="8" fill="#06B6D4" opacity="0.3" filter="url(#blur1)"/>
  <circle cx="160" cy="150" r="5" fill="#06B6D4" opacity="0.9"/>
  <circle cx="160" cy="150" r="2" fill="#E0F2FE" opacity="0.95"/>

  <!-- Crystals (golden diamonds) -->
  <polygon points="280,80 285,90 280,100 275,90" fill="#F59E0B" opacity="0.8" filter="url(#blur2)"/>
  <polygon points="110,180 114,188 110,196 106,188" fill="#F59E0B" opacity="0.6" filter="url(#blur2)"/>

  <!-- Exit portal (green glow) -->
  <circle cx="340" cy="150" r="16" fill="#10B981" opacity="0.15" filter="url(#blur1)"/>
  <circle cx="340" cy="150" r="10" fill="#10B981" opacity="0.3"/>
  <circle cx="340" cy="150" r="6" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.6"/>
  <circle cx="340" cy="150" r="2" fill="#D1FAE5" opacity="0.8"/>

  <!-- Title -->
  <text x="200" y="278" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="bold" fill="#06B6D4" opacity="0.9">ECO</text>
</svg>
