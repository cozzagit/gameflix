<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2A2018"/>
      <stop offset="100%" stop-color="#1a1610"/>
    </radialGradient>
    <linearGradient id="hexGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A3520"/>
      <stop offset="30%" stop-color="#5A4028"/>
      <stop offset="50%" stop-color="#6B4E30"/>
      <stop offset="70%" stop-color="#5A4028"/>
      <stop offset="100%" stop-color="#3E2C18"/>
    </linearGradient>
    <linearGradient id="hexGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="30%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4A535"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFECB3"/>
      <stop offset="70%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C4A535"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Subtle radial light -->
  <circle cx="200" cy="140" r="120" fill="rgba(255,200,80,0.04)"/>

  <!-- Hexagonal grid - 3 rows of hexagons -->
  <!-- Row 0: 4 hexagons -->
  <g transform="translate(200,130)">
    <!-- Row 0 (centered) -->
    <g>
      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(-65,-45)" fill="url(#hexGold)" stroke="#8B7340" stroke-width="1"/>
      <text x="-65" y="-41" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#D4C5A9">I</text>

      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(-21,-45)" fill="url(#hexGold)" stroke="#8B7340" stroke-width="1"/>
      <text x="-21" y="-41" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#D4C5A9">N</text>

      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(23,-45)" fill="url(#hexGold)" stroke="#8B7340" stroke-width="1"/>
      <text x="23" y="-41" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#D4C5A9">T</text>

      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(67,-45)" fill="url(#hexGold)" stroke="#8B7340" stroke-width="1"/>
      <text x="67" y="-41" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#D4C5A9">R</text>
    </g>

    <!-- Row 1 (offset, glowing path) -->
    <g filter="url(#goldGlow)">
      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(-43,-7)" fill="url(#hexGlow)" stroke="#FFD700" stroke-width="2"/>
      <text x="-43" y="-3" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#FFF8E1">E</text>

      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(1,-7)" fill="url(#hexGlow)" stroke="#FFD700" stroke-width="2"/>
      <text x="1" y="-3" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#FFF8E1">S</text>

      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(45,-7)" fill="url(#hexGlow)" stroke="#FFD700" stroke-width="2"/>
      <text x="45" y="-3" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#FFF8E1">S</text>
    </g>

    <!-- Glowing connection line -->
    <line x1="-43" y1="-7" x2="1" y2="-7" stroke="#FFD700" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
    <line x1="1" y1="-7" x2="45" y2="-7" stroke="#FFD700" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
    <line x1="-43" y1="-7" x2="1" y2="-7" stroke="#FFECB3" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>
    <line x1="1" y1="-7" x2="45" y2="-7" stroke="#FFECB3" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>

    <!-- Row 2 -->
    <g>
      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(-65,31)" fill="url(#hexGold)" stroke="#8B7340" stroke-width="1"/>
      <text x="-65" y="35" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#D4C5A9">I</text>

      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(-21,31)" fill="url(#hexGold)" stroke="#8B7340" stroke-width="1"/>
      <text x="-21" y="35" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#D4C5A9">O</text>

      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(23,31)" fill="url(#hexGold)" stroke="#8B7340" stroke-width="1"/>
      <text x="23" y="35" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#D4C5A9">A</text>

      <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" transform="translate(67,31)" fill="url(#hexGold)" stroke="#8B7340" stroke-width="1"/>
      <text x="67" y="35" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#D4C5A9">L</text>
    </g>
  </g>

  <!-- Sparkles -->
  <g fill="#FFD700" opacity="0.6">
    <circle cx="120" cy="100" r="1.5"/>
    <circle cx="280" cy="95" r="1"/>
    <circle cx="155" cy="190" r="1.2"/>
    <circle cx="250" cy="185" r="1.5"/>
    <circle cx="310" cy="130" r="1"/>
    <circle cx="90" cy="160" r="1.3"/>
  </g>

  <!-- Title -->
  <text x="200" y="252" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="28" font-weight="bold" fill="url(#titleGrad)" filter="url(#glow)">INTRECCIO</text>

  <!-- Subtitle -->
  <text x="200" y="275" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#BFB092" font-style="italic">Tessi parole sulla griglia dorata</text>
</svg>
