<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <!-- Background -->
    <radialGradient id="cBg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#2a2218"/>
      <stop offset="100%" stop-color="#1A1612"/>
    </radialGradient>

    <!-- Brass cylinder gradient -->
    <linearGradient id="cBrass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a44a"/>
      <stop offset="15%" stop-color="#f0d080"/>
      <stop offset="30%" stop-color="#c89830"/>
      <stop offset="50%" stop-color="#e8c460"/>
      <stop offset="70%" stop-color="#b08020"/>
      <stop offset="85%" stop-color="#dab050"/>
      <stop offset="100%" stop-color="#8a6020"/>
    </linearGradient>

    <!-- Cylinder body - horizontal metallic -->
    <linearGradient id="cylBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#705018"/>
      <stop offset="10%" stop-color="#c89830"/>
      <stop offset="25%" stop-color="#f0d080"/>
      <stop offset="40%" stop-color="#e0b850"/>
      <stop offset="50%" stop-color="#d4a44a"/>
      <stop offset="65%" stop-color="#c89830"/>
      <stop offset="80%" stop-color="#a07828"/>
      <stop offset="95%" stop-color="#705018"/>
      <stop offset="100%" stop-color="#604010"/>
    </linearGradient>

    <!-- Letter wheel gradient -->
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a6020"/>
      <stop offset="15%" stop-color="#dab050"/>
      <stop offset="30%" stop-color="#f5e098"/>
      <stop offset="50%" stop-color="#e8c460"/>
      <stop offset="70%" stop-color="#c89830"/>
      <stop offset="85%" stop-color="#dab050"/>
      <stop offset="100%" stop-color="#705018"/>
    </linearGradient>

    <!-- Parchment gradient -->
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="30%" stop-color="#e8d4a8"/>
      <stop offset="60%" stop-color="#d4c090"/>
      <stop offset="100%" stop-color="#c4a870"/>
    </linearGradient>

    <!-- Parchment aged edges -->
    <linearGradient id="parchEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a08050" stop-opacity="0.6"/>
      <stop offset="10%" stop-color="#d4c090" stop-opacity="0"/>
      <stop offset="90%" stop-color="#d4c090" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a08050" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Warm golden ambient -->
    <radialGradient id="cWarm" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ffab00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffab00" stop-opacity="0"/>
    </radialGradient>

    <!-- Wax seal gradient -->
    <radialGradient id="waxSeal" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#cc3333"/>
      <stop offset="30%" stop-color="#aa2222"/>
      <stop offset="60%" stop-color="#881818"/>
      <stop offset="100%" stop-color="#661010"/>
    </radialGradient>

    <!-- Wax seal highlight -->
    <radialGradient id="waxHighlight" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#ff6666" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#cc3333" stop-opacity="0"/>
    </radialGradient>

    <!-- Rivet -->
    <radialGradient id="cRivet" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#f0d080"/>
      <stop offset="50%" stop-color="#b08020"/>
      <stop offset="100%" stop-color="#705018"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="cGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="cSoftGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <filter id="cDropShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <filter id="cTextGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="paperTexture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>

    <filter id="emboss">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.6" specularExponent="15" result="spec">
        <fePointLight x="-100" y="-100" z="200"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="spec" operator="arithmetic" k1="0" k2="1" k3="0.8" k4="0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#cBg)"/>

  <!-- Subtle wood grain texture -->
  <g opacity="0.05">
    <line x1="0" y1="5" x2="640" y2="8" stroke="#8a6020" stroke-width="0.5"/>
    <line x1="0" y1="18" x2="640" y2="15" stroke="#705018" stroke-width="0.3"/>
    <line x1="0" y1="30" x2="640" y2="33" stroke="#8a6020" stroke-width="0.4"/>
    <line x1="0" y1="55" x2="640" y2="52" stroke="#705018" stroke-width="0.3"/>
    <line x1="0" y1="80" x2="640" y2="83" stroke="#8a6020" stroke-width="0.5"/>
    <line x1="0" y1="110" x2="640" y2="108" stroke="#705018" stroke-width="0.3"/>
    <line x1="0" y1="150" x2="640" y2="153" stroke="#8a6020" stroke-width="0.4"/>
    <line x1="0" y1="200" x2="640" y2="198" stroke="#705018" stroke-width="0.3"/>
    <line x1="0" y1="250" x2="640" y2="253" stroke="#8a6020" stroke-width="0.5"/>
    <line x1="0" y1="290" x2="640" y2="288" stroke="#705018" stroke-width="0.3"/>
    <line x1="0" y1="330" x2="640" y2="333" stroke="#8a6020" stroke-width="0.4"/>
  </g>

  <!-- Warm ambient light -->
  <circle cx="320" cy="165" r="200" fill="url(#cWarm)"/>

  <!-- Parchment/scroll behind the cryptex -->
  <g filter="url(#cDropShadow)">
    <!-- Scroll body -->
    <rect x="120" y="100" width="400" height="180" rx="4" fill="url(#parchment)" opacity="0.85"/>
    <!-- Aged overlay -->
    <rect x="120" y="100" width="400" height="180" rx="4" fill="url(#parchEdge)" opacity="0.5"/>

    <!-- Parchment text lines (faded writing) -->
    <g opacity="0.12" stroke="#705018" stroke-width="0.4">
      <line x1="140" y1="115" x2="280" y2="115"/>
      <line x1="140" y1="125" x2="320" y2="125"/>
      <line x1="140" y1="135" x2="260" y2="135"/>
      <line x1="350" y1="115" x2="500" y2="115"/>
      <line x1="370" y1="125" x2="490" y2="125"/>
      <line x1="140" y1="245" x2="310" y2="245"/>
      <line x1="140" y1="255" x2="270" y2="255"/>
      <line x1="140" y1="265" x2="300" y2="265"/>
      <line x1="360" y1="250" x2="500" y2="250"/>
      <line x1="380" y1="260" x2="480" y2="260"/>
    </g>

    <!-- Decorative symbols on parchment -->
    <g opacity="0.08" fill="#705018">
      <text x="150" y="130" font-family="serif" font-size="10">VERITAS LUX IN TENEBRIS</text>
      <text x="380" y="258" font-family="serif" font-size="9">SAPERE AUDE</text>
    </g>

    <!-- Scroll left curl -->
    <ellipse cx="120" cy="190" rx="12" ry="92" fill="url(#parchment)" opacity="0.7" stroke="#b09060" stroke-width="0.5"/>
    <ellipse cx="115" cy="190" rx="6" ry="88" fill="#c4a870" opacity="0.5"/>

    <!-- Scroll right curl -->
    <ellipse cx="520" cy="190" rx="12" ry="92" fill="url(#parchment)" opacity="0.7" stroke="#b09060" stroke-width="0.5"/>
    <ellipse cx="525" cy="190" rx="6" ry="88" fill="#c4a870" opacity="0.5"/>
  </g>

  <!-- Cryptex cylinder -->
  <g filter="url(#cDropShadow)">
    <!-- Main cylinder body -->
    <rect x="155" y="150" width="330" height="70" rx="3" fill="url(#cylBody)"/>

    <!-- End caps -->
    <!-- Left end cap -->
    <ellipse cx="158" cy="185" rx="8" ry="35" fill="url(#cBrass)" stroke="#604010" stroke-width="1"/>
    <ellipse cx="155" cy="185" rx="5" ry="30" fill="#8a6020" opacity="0.4"/>

    <!-- Right end cap -->
    <ellipse cx="482" cy="185" rx="8" ry="35" fill="url(#cBrass)" stroke="#604010" stroke-width="1"/>
    <ellipse cx="485" cy="185" rx="5" ry="30" fill="#8a6020" opacity="0.4"/>

    <!-- Cylinder ridge lines -->
    <g stroke="#604010" stroke-width="0.5" opacity="0.3">
      <line x1="155" y1="155" x2="485" y2="155"/>
      <line x1="155" y1="215" x2="485" y2="215"/>
    </g>

    <!-- Separation grooves between wheels -->
    <g stroke="#503808" stroke-width="2" opacity="0.6">
      <line x1="210" y1="148" x2="210" y2="222"/>
      <line x1="265" y1="148" x2="265" y2="222"/>
      <line x1="320" y1="148" x2="320" y2="222"/>
      <line x1="375" y1="148" x2="375" y2="222"/>
      <line x1="430" y1="148" x2="430" y2="222"/>
    </g>

    <!-- Letter wheels — CRYPTEX (7 wheels, each 42px wide, starting at x=163) -->
    <!-- Wheel 1: C -->
    <g>
      <rect x="163" y="148" width="42" height="74" rx="1" fill="url(#wheelGrad)" stroke="#705018" stroke-width="0.5"/>
      <g stroke="#a07828" stroke-width="0.5" opacity="0.4">
        <line x1="166" y1="148" x2="166" y2="222"/><line x1="170" y1="148" x2="170" y2="222"/>
        <line x1="196" y1="148" x2="196" y2="222"/><line x1="200" y1="148" x2="200" y2="222"/>
      </g>
      <rect x="172" y="172" width="26" height="26" rx="2" fill="#1A1612" opacity="0.7"/>
      <text x="185" y="194" text-anchor="middle" font-family="'Georgia', serif" font-size="21" font-weight="700" fill="#f0d080" opacity="0.9">C</text>
      <text x="185" y="168" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">B</text>
      <text x="185" y="216" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">D</text>
    </g>
    <!-- Wheel 2: R -->
    <g>
      <rect x="208" y="148" width="42" height="74" rx="1" fill="url(#wheelGrad)" stroke="#705018" stroke-width="0.5"/>
      <g stroke="#a07828" stroke-width="0.5" opacity="0.4">
        <line x1="211" y1="148" x2="211" y2="222"/><line x1="215" y1="148" x2="215" y2="222"/>
        <line x1="241" y1="148" x2="241" y2="222"/><line x1="245" y1="148" x2="245" y2="222"/>
      </g>
      <rect x="217" y="172" width="26" height="26" rx="2" fill="#1A1612" opacity="0.7"/>
      <text x="230" y="194" text-anchor="middle" font-family="'Georgia', serif" font-size="21" font-weight="700" fill="#f0d080" opacity="0.9">R</text>
      <text x="230" y="168" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">Q</text>
      <text x="230" y="216" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">S</text>
    </g>
    <!-- Wheel 3: Y -->
    <g>
      <rect x="253" y="148" width="42" height="74" rx="1" fill="url(#wheelGrad)" stroke="#705018" stroke-width="0.5"/>
      <g stroke="#a07828" stroke-width="0.5" opacity="0.4">
        <line x1="256" y1="148" x2="256" y2="222"/><line x1="260" y1="148" x2="260" y2="222"/>
        <line x1="286" y1="148" x2="286" y2="222"/><line x1="290" y1="148" x2="290" y2="222"/>
      </g>
      <rect x="262" y="172" width="26" height="26" rx="2" fill="#1A1612" opacity="0.7"/>
      <text x="275" y="194" text-anchor="middle" font-family="'Georgia', serif" font-size="21" font-weight="700" fill="#f0d080" opacity="0.9">Y</text>
      <text x="275" y="168" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">X</text>
      <text x="275" y="216" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">Z</text>
    </g>
    <!-- Wheel 4: P -->
    <g>
      <rect x="298" y="148" width="42" height="74" rx="1" fill="url(#wheelGrad)" stroke="#705018" stroke-width="0.5"/>
      <g stroke="#a07828" stroke-width="0.5" opacity="0.4">
        <line x1="301" y1="148" x2="301" y2="222"/><line x1="305" y1="148" x2="305" y2="222"/>
        <line x1="331" y1="148" x2="331" y2="222"/><line x1="335" y1="148" x2="335" y2="222"/>
      </g>
      <rect x="307" y="172" width="26" height="26" rx="2" fill="#1A1612" opacity="0.7"/>
      <text x="320" y="194" text-anchor="middle" font-family="'Georgia', serif" font-size="21" font-weight="700" fill="#f0d080" opacity="0.9">P</text>
      <text x="320" y="168" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">O</text>
      <text x="320" y="216" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">Q</text>
    </g>
    <!-- Wheel 5: T -->
    <g>
      <rect x="343" y="148" width="42" height="74" rx="1" fill="url(#wheelGrad)" stroke="#705018" stroke-width="0.5"/>
      <g stroke="#a07828" stroke-width="0.5" opacity="0.4">
        <line x1="346" y1="148" x2="346" y2="222"/><line x1="350" y1="148" x2="350" y2="222"/>
        <line x1="376" y1="148" x2="376" y2="222"/><line x1="380" y1="148" x2="380" y2="222"/>
      </g>
      <rect x="352" y="172" width="26" height="26" rx="2" fill="#1A1612" opacity="0.7"/>
      <text x="365" y="194" text-anchor="middle" font-family="'Georgia', serif" font-size="21" font-weight="700" fill="#f0d080" opacity="0.9">T</text>
      <text x="365" y="168" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">S</text>
      <text x="365" y="216" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">U</text>
    </g>
    <!-- Wheel 6: E -->
    <g>
      <rect x="388" y="148" width="42" height="74" rx="1" fill="url(#wheelGrad)" stroke="#705018" stroke-width="0.5"/>
      <g stroke="#a07828" stroke-width="0.5" opacity="0.4">
        <line x1="391" y1="148" x2="391" y2="222"/><line x1="395" y1="148" x2="395" y2="222"/>
        <line x1="421" y1="148" x2="421" y2="222"/><line x1="425" y1="148" x2="425" y2="222"/>
      </g>
      <rect x="397" y="172" width="26" height="26" rx="2" fill="#1A1612" opacity="0.7"/>
      <text x="410" y="194" text-anchor="middle" font-family="'Georgia', serif" font-size="21" font-weight="700" fill="#f0d080" opacity="0.9">E</text>
      <text x="410" y="168" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">D</text>
      <text x="410" y="216" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">F</text>
    </g>
    <!-- Wheel 7: X -->
    <g>
      <rect x="433" y="148" width="42" height="74" rx="1" fill="url(#wheelGrad)" stroke="#705018" stroke-width="0.5"/>
      <g stroke="#a07828" stroke-width="0.5" opacity="0.4">
        <line x1="436" y1="148" x2="436" y2="222"/><line x1="440" y1="148" x2="440" y2="222"/>
        <line x1="466" y1="148" x2="466" y2="222"/><line x1="470" y1="148" x2="470" y2="222"/>
      </g>
      <rect x="442" y="172" width="26" height="26" rx="2" fill="#1A1612" opacity="0.7"/>
      <text x="455" y="194" text-anchor="middle" font-family="'Georgia', serif" font-size="21" font-weight="700" fill="#f0d080" opacity="0.9">X</text>
      <text x="455" y="168" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">W</text>
      <text x="455" y="216" text-anchor="middle" font-family="'Georgia', serif" font-size="13" fill="#8a6020" opacity="0.25">Y</text>
    </g>

    <!-- Alignment arrow/indicator line -->
    <polygon points="153,170 146,185 153,200" fill="#b08020" opacity="0.6"/>
    <line x1="153" y1="170" x2="485" y2="170" stroke="#8a6020" stroke-width="0.3" opacity="0.3"/>
    <line x1="153" y1="200" x2="485" y2="200" stroke="#8a6020" stroke-width="0.3" opacity="0.3"/>

    <!-- Cylinder top/bottom highlight -->
    <rect x="158" y="149" width="322" height="2" fill="#f0d080" opacity="0.15"/>
    <rect x="158" y="219" width="322" height="2" fill="#000000" opacity="0.15"/>
  </g>

  <!-- Wax seal -->
  <g transform="translate(540, 260)" filter="url(#cDropShadow)">
    <circle cx="0" cy="0" r="28" fill="url(#waxSeal)"/>
    <circle cx="0" cy="0" r="28" fill="url(#waxHighlight)"/>
    <!-- Seal edge irregularity -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="#661010" stroke-width="1.5" opacity="0.4"/>
    <!-- Fleur-de-lis simplified -->
    <g fill="#aa3333" opacity="0.6">
      <ellipse cx="0" cy="-8" rx="4" ry="10"/>
      <ellipse cx="-8" cy="-2" rx="3" ry="8" transform="rotate(-25 -8 -2)"/>
      <ellipse cx="8" cy="-2" rx="3" ry="8" transform="rotate(25 8 -2)"/>
      <rect x="-2" y="-2" width="4" height="14" rx="1"/>
      <ellipse cx="0" cy="12" rx="6" ry="3"/>
    </g>
    <!-- Seal rope -->
    <line x1="-28" y1="5" x2="-55" y2="15" stroke="#881818" stroke-width="2.5" opacity="0.5"/>
    <line x1="-55" y1="15" x2="-70" y2="10" stroke="#881818" stroke-width="2" opacity="0.35"/>
  </g>

  <!-- Da Vinci style decorative compass/circle in corner -->
  <g transform="translate(80, 290)" opacity="0.12">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#c89830" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#c89830" stroke-width="0.5"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#c89830" stroke-width="0.3"/>
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#c89830" stroke-width="0.3"/>
    <line x1="-21" y1="-21" x2="21" y2="21" stroke="#c89830" stroke-width="0.3"/>
    <line x1="-21" y1="21" x2="21" y2="-21" stroke="#c89830" stroke-width="0.3"/>
    <!-- Vitruvian figure hint -->
    <circle cx="0" cy="-12" r="3" fill="none" stroke="#c89830" stroke-width="0.4"/>
    <line x1="0" y1="-9" x2="0" y2="5" stroke="#c89830" stroke-width="0.4"/>
    <line x1="-10" y1="-4" x2="10" y2="-4" stroke="#c89830" stroke-width="0.4"/>
    <line x1="0" y1="5" x2="-6" y2="16" stroke="#c89830" stroke-width="0.4"/>
    <line x1="0" y1="5" x2="6" y2="16" stroke="#c89830" stroke-width="0.4"/>
  </g>

  <!-- Golden ambient light on the cryptex -->
  <ellipse cx="320" cy="185" rx="180" ry="50" fill="#ffd54f" opacity="0.04" filter="url(#cSoftGlow)"/>

  <!-- Dust particles -->
  <g fill="#d4a44a" opacity="0.15">
    <circle cx="180" cy="80" r="1"/>
    <circle cx="350" cy="60" r="0.8"/>
    <circle cx="500" cy="90" r="1.2"/>
    <circle cx="280" cy="300" r="0.7"/>
    <circle cx="450" cy="280" r="0.9"/>
    <circle cx="130" cy="200" r="0.6"/>
    <circle cx="560" cy="150" r="1"/>
    <circle cx="400" cy="320" r="0.8"/>
  </g>

  <!-- Vignette corners -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#1A1612" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0f0d0a" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="640" height="360" fill="url(#vignette)"/>

  <!-- Title text -->
  <text x="320" y="340" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="20" font-weight="700" letter-spacing="14" fill="#c89830" opacity="0.5" filter="url(#cTextGlow)">CRYPTEX</text>
</svg>