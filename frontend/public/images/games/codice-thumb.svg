<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <filter id="cdGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cdShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <radialGradient id="cdBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0f2a0f"/>
      <stop offset="100%" stop-color="#050a05"/>
    </radialGradient>
    <radialGradient id="cdScreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a2a0a"/>
      <stop offset="100%" stop-color="#061206"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#cdBg)"/>

  <!-- Scanlines -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="640" y2="0" stroke="#0f0" stroke-width="1" transform="translate(0,4)"/>
    <line x1="0" y1="0" x2="640" y2="0" stroke="#0f0" stroke-width="1" transform="translate(0,8)"/>
    <line x1="0" y1="0" x2="640" y2="0" stroke="#0f0" stroke-width="1" transform="translate(0,12)"/>
    <line x1="0" y1="0" x2="640" y2="0" stroke="#0f0" stroke-width="1" transform="translate(0,16)"/>
    <line x1="0" y1="0" x2="640" y2="0" stroke="#0f0" stroke-width="1" transform="translate(0,20)"/>
    <line x1="0" y1="0" x2="640" y2="0" stroke="#0f0" stroke-width="1" transform="translate(0,24)"/>
  </g>

  <!-- Terminal screen frame -->
  <rect x="30" y="25" width="370" height="200" rx="4" fill="none" stroke="#1a4a1a" stroke-width="2.5"/>
  <rect x="35" y="30" width="360" height="190" rx="2" fill="url(#cdScreen)"/>

  <!-- Encrypted message -->
  <rect x="50" y="45" width="320" height="55" rx="3" fill="#0d250d" stroke="#1a5a1a" stroke-width="1"/>
  <text x="60" y="58" font-family="'Courier New', monospace" font-size="8" fill="#005518">MESSAGGIO INTERCETTATO</text>
  <text x="210" y="82" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#00FF41" filter="url(#cdGlow)">GSYFVI JMVIR</text>

  <!-- Decoded area -->
  <rect x="50" y="112" width="320" height="45" rx="3" fill="#081808" stroke="#1a5a1a" stroke-width="1"/>
  <text x="60" y="125" font-family="'Courier New', monospace" font-size="8" fill="#005518">DECODIFICATO</text>
  <text x="210" y="147" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#FFB000" filter="url(#cdGlow)">CODICE SIREN</text>

  <!-- Blinking cursor -->
  <rect x="294" y="133" width="12" height="20" rx="1" fill="#FFB000" opacity="0.7"/>

  <!-- Frequency bars -->
  <g transform="translate(55,170)">
    <text x="0" y="8" font-family="'Courier New', monospace" font-size="6" fill="#004410">ANALISI FREQUENZA</text>
    <rect x="0" y="12" width="6" height="28" fill="#005518"/><rect x="9" y="18" width="6" height="22" fill="#005518"/>
    <rect x="18" y="8" width="6" height="32" fill="#00AA2A"/><rect x="27" y="22" width="6" height="18" fill="#005518"/>
    <rect x="36" y="14" width="6" height="26" fill="#005518"/><rect x="45" y="4" width="6" height="36" fill="#008820"/>
    <rect x="54" y="20" width="6" height="20" fill="#005518"/><rect x="63" y="10" width="6" height="30" fill="#005518"/>
    <rect x="72" y="24" width="6" height="16" fill="#005518"/><rect x="81" y="6" width="6" height="34" fill="#00AA2A"/>
    <rect x="90" y="16" width="6" height="24" fill="#005518"/><rect x="99" y="28" width="6" height="12" fill="#005518"/>
  </g>

  <!-- Cipher wheel — large, detailed -->
  <g transform="translate(500, 155)" filter="url(#cdShadow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#006620" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="#004410" stroke-width="1"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="68" fill="none" stroke="#005518" stroke-width="2"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#003d10" stroke-width="1"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="15" fill="#0a180a" stroke="#006620" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="#00FF41"/>

    <!-- Outer letters -->
    <g font-family="'Courier New', monospace" font-size="11" fill="#00CC33" text-anchor="middle" filter="url(#cdGlow)">
      <text x="0" y="-78">A</text><text x="30" y="-72">B</text><text x="55" y="-55">C</text>
      <text x="72" y="-30">D</text><text x="78" y="0">E</text><text x="72" y="30">F</text>
      <text x="55" y="55">G</text><text x="30" y="72">H</text><text x="0" y="82">I</text>
      <text x="-30" y="72">J</text><text x="-55" y="55">K</text><text x="-72" y="30">L</text>
      <text x="-78" y="0">M</text><text x="-72" y="-30">N</text><text x="-55" y="-55">O</text>
      <text x="-30" y="-72">P</text>
    </g>

    <!-- Inner letters (shifted) -->
    <g font-family="'Courier New', monospace" font-size="9" fill="#FFB000" text-anchor="middle">
      <text x="0" y="-52">D</text><text x="20" y="-48">E</text><text x="38" y="-38">F</text>
      <text x="48" y="-20">G</text><text x="52" y="0">H</text><text x="48" y="20">I</text>
      <text x="38" y="38">J</text><text x="20" y="48">K</text><text x="0" y="55">L</text>
      <text x="-20" y="48">M</text><text x="-38" y="38">N</text><text x="-48" y="20">O</text>
      <text x="-52" y="0">P</text><text x="-48" y="-20">Q</text><text x="-38" y="-38">R</text>
      <text x="-20" y="-48">S</text>
    </g>

    <!-- Tick marks -->
    <g stroke="#004410" stroke-width="0.5" opacity="0.4">
      <line x1="0" y1="-90" x2="0" y2="-85"/><line x1="45" y1="-78" x2="42" y2="-73"/>
      <line x1="78" y1="-45" x2="73" y2="-42"/><line x1="90" y1="0" x2="85" y2="0"/>
      <line x1="78" y1="45" x2="73" y2="42"/><line x1="45" y1="78" x2="42" y2="73"/>
      <line x1="0" y1="90" x2="0" y2="85"/><line x1="-45" y1="78" x2="-42" y2="73"/>
      <line x1="-78" y1="45" x2="-73" y2="42"/><line x1="-90" y1="0" x2="-85" y2="0"/>
      <line x1="-78" y1="-45" x2="-73" y2="-42"/><line x1="-45" y1="-78" x2="-42" y2="-73"/>
    </g>
  </g>

  <!-- CLASSIFICATO stamp -->
  <g transform="translate(210,275) rotate(-6)">
    <rect x="-95" y="-20" width="190" height="40" fill="none" stroke="#CC0000" stroke-width="3" opacity="0.6" rx="3"/>
    <rect x="-100" y="-24" width="200" height="48" fill="none" stroke="#CC0000" stroke-width="1.5" opacity="0.35" rx="3"/>
    <text x="0" y="7" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#CC0000" text-anchor="middle" opacity="0.6">CLASSIFICATO</text>
  </g>

  <!-- Morse code border decoration -->
  <g fill="#005518" opacity="0.4">
    <circle cx="25" cy="10" r="2"/><circle cx="33" cy="10" r="2"/><circle cx="41" cy="10" r="2"/>
    <rect x="49" y="8" width="12" height="4" rx="2"/>
    <circle cx="69" cy="10" r="2"/><rect x="77" y="8" width="12" height="4" rx="2"/>
    <rect x="97" y="8" width="12" height="4" rx="2"/><circle cx="117" cy="10" r="2"/>
    <circle cx="125" cy="10" r="2"/><rect x="133" y="8" width="12" height="4" rx="2"/>
    <circle cx="560" cy="350" r="2"/><circle cx="568" cy="350" r="2"/>
    <rect x="576" y="348" width="12" height="4" rx="2"/><circle cx="596" cy="350" r="2"/>
    <rect x="604" y="348" width="12" height="4" rx="2"/>
  </g>

  <!-- Title -->
  <text x="320" y="338" text-anchor="middle" font-family="'Courier New', monospace" font-size="30" font-weight="bold" fill="#00FF41" filter="url(#cdGlow)">CODICE</text>
  <text x="320" y="354" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#005518">SISTEMA DI DECRITTAZIONE AVANZATO</text>

  <!-- Vignette -->
  <rect width="640" height="360" fill="url(#cdBg)" opacity="0.2"/>
</svg>
