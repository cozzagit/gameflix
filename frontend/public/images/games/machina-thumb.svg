<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <!-- Background -->
    <radialGradient id="mBg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#252540"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </radialGradient>

    <!-- Brass/gold metallic gradient -->
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a44a"/>
      <stop offset="20%" stop-color="#f0d080"/>
      <stop offset="40%" stop-color="#c89830"/>
      <stop offset="60%" stop-color="#e8c460"/>
      <stop offset="80%" stop-color="#b08020"/>
      <stop offset="100%" stop-color="#d4a44a"/>
    </linearGradient>

    <!-- Darker brass -->
    <linearGradient id="brassDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a6020"/>
      <stop offset="30%" stop-color="#a07828"/>
      <stop offset="60%" stop-color="#705018"/>
      <stop offset="100%" stop-color="#8a6020"/>
    </linearGradient>

    <!-- Bronze gradient -->
    <linearGradient id="bronze" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cd7f32"/>
      <stop offset="25%" stop-color="#e8a850"/>
      <stop offset="50%" stop-color="#b06820"/>
      <stop offset="75%" stop-color="#daa060"/>
      <stop offset="100%" stop-color="#8b5e14"/>
    </linearGradient>

    <!-- Golden light glow -->
    <radialGradient id="goldenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffab00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff8f00" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient warm light -->
    <radialGradient id="warmAmbient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffab00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffab00" stop-opacity="0"/>
    </radialGradient>

    <!-- Rivet gradient -->
    <radialGradient id="rivet" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#f0d080"/>
      <stop offset="50%" stop-color="#b08020"/>
      <stop offset="100%" stop-color="#705018"/>
    </radialGradient>

    <!-- Gear tooth pattern for reuse -->
    <linearGradient id="gearFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c89830"/>
      <stop offset="30%" stop-color="#e0b850"/>
      <stop offset="50%" stop-color="#b88828"/>
      <stop offset="70%" stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#a07020"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="mGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="mSoftGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>

    <filter id="mDropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="1" dy="1" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>

    <filter id="mTextGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Gear 1 (large) - 16 teeth -->
    <clipPath id="gear1Clip">
      <circle cx="0" cy="0" r="90"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#mBg)"/>

  <!-- Subtle texture lines -->
  <g stroke="#2a2a44" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="0" x2="640" y2="0"/>
    <line x1="0" y1="8" x2="640" y2="8"/>
    <line x1="0" y1="16" x2="640" y2="16"/>
    <line x1="0" y1="24" x2="640" y2="24"/>
    <line x1="0" y1="32" x2="640" y2="32"/>
    <line x1="0" y1="40" x2="640" y2="40"/>
    <line x1="0" y1="48" x2="640" y2="48"/>
    <line x1="0" y1="320" x2="640" y2="320"/>
    <line x1="0" y1="328" x2="640" y2="328"/>
    <line x1="0" y1="336" x2="640" y2="336"/>
    <line x1="0" y1="344" x2="640" y2="344"/>
    <line x1="0" y1="352" x2="640" y2="352"/>
  </g>

  <!-- Warm ambient light -->
  <circle cx="320" cy="160" r="250" fill="url(#warmAmbient)"/>

  <!-- Large gear (left) -->
  <g transform="translate(220, 170)" filter="url(#mDropShadow)">
    <!-- Gear body with teeth -->
    <path d="M 0,-95 L 8,-95 L 10,-82 A 82,82 0 0,1 28,-78 L 35,-90 L 42,-85 L 38,-72 A 82,82 0 0,1 54,-63 L 64,-73 L 70,-66 L 62,-55 A 82,82 0 0,1 73,-42 L 85,-46 L 88,-38 L 76,-32 A 82,82 0 0,1 82,-14 L 95,-12 L 95,-4 L 82,-4 A 82,82 0 0,1 80,16 L 93,20 L 91,28 L 78,24 A 82,82 0 0,1 68,44 L 79,53 L 74,60 L 63,51 A 82,82 0 0,1 50,64 L 56,76 L 49,80 L 42,69 A 82,82 0 0,1 24,78 L 24,92 L 16,93 L 14,80 A 82,82 0 0,1 -6,82 L -8,95 L -16,94 L -14,81 A 82,82 0 0,1 -34,76 L -40,88 L -47,84 L -41,72 A 82,82 0 0,1 -58,60 L -68,68 L -73,62 L -64,52 A 82,82 0 0,1 -76,36 L -89,38 L -91,30 L -78,28 A 82,82 0 0,1 -82,8 L -95,6 L -95,-2 L -82,-2 A 82,82 0 0,1 -80,-22 L -92,-28 L -89,-36 L -76,-30 A 82,82 0 0,1 -66,-50 L -76,-60 L -70,-66 L -60,-56 A 82,82 0 0,1 -46,-68 L -50,-82 L -42,-85 L -38,-72 A 82,82 0 0,1 -20,-80 L -18,-94 L -10,-95 L -10,-82 A 82,82 0 0,1 0,-80 Z"
          fill="url(#gearFace)" stroke="#705018" stroke-width="1"/>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="65" fill="#1A1A2E" stroke="url(#brassDark)" stroke-width="3"/>
    <!-- Spokes -->
    <g fill="url(#brass)" stroke="#705018" stroke-width="0.5">
      <rect x="-5" y="-62" width="10" height="124" rx="2"/>
      <rect x="-5" y="-62" width="10" height="124" rx="2" transform="rotate(60)"/>
      <rect x="-5" y="-62" width="10" height="124" rx="2" transform="rotate(120)"/>
    </g>
    <!-- Hub -->
    <circle cx="0" cy="0" r="18" fill="url(#bronze)" stroke="#705018" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="10" fill="#1A1A2E" stroke="url(#brassDark)" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="url(#rivet)"/>
    <!-- Decorative circles on the ring -->
    <circle cx="0" cy="-50" r="6" fill="#1A1A2E" stroke="url(#brassDark)" stroke-width="1.5"/>
    <circle cx="43" cy="25" r="6" fill="#1A1A2E" stroke="url(#brassDark)" stroke-width="1.5"/>
    <circle cx="-43" cy="25" r="6" fill="#1A1A2E" stroke="url(#brassDark)" stroke-width="1.5"/>
  </g>

  <!-- Medium gear (right, interlocking) -->
  <g transform="translate(380, 155)" filter="url(#mDropShadow)">
    <path d="M 0,-68 L 6,-68 L 8,-58 A 58,58 0 0,1 22,-54 L 28,-64 L 34,-60 L 29,-50 A 58,58 0 0,1 42,-40 L 51,-47 L 55,-41 L 47,-33 A 58,58 0 0,1 55,-18 L 66,-16 L 66,-9 L 56,-8 A 58,58 0 0,1 54,10 L 65,14 L 63,21 L 53,17 A 58,58 0 0,1 44,32 L 52,40 L 47,46 L 39,38 A 58,58 0 0,1 26,48 L 28,60 L 21,62 L 18,50 A 58,58 0 0,1 2,54 L 0,66 L -7,66 L -7,54 A 58,58 0 0,1 -24,50 L -28,62 L -35,59 L -31,47 A 58,58 0 0,1 -44,36 L -53,42 L -57,36 L -48,29 A 58,58 0 0,1 -55,14 L -66,15 L -67,8 L -56,7 A 58,58 0 0,1 -56,-12 L -67,-16 L -66,-23 L -55,-19 A 58,58 0 0,1 -48,-34 L -56,-43 L -51,-48 L -42,-40 A 58,58 0 0,1 -30,-50 L -32,-63 L -25,-65 L -22,-53 A 58,58 0 0,1 -6,-56 Z"
          fill="url(#gearFace)" stroke="#705018" stroke-width="1"/>
    <circle cx="0" cy="0" r="42" fill="#1A1A2E" stroke="url(#brassDark)" stroke-width="2.5"/>
    <g fill="url(#brass)" stroke="#705018" stroke-width="0.5">
      <rect x="-4" y="-40" width="8" height="80" rx="2"/>
      <rect x="-4" y="-40" width="8" height="80" rx="2" transform="rotate(90)"/>
    </g>
    <circle cx="0" cy="0" r="14" fill="url(#bronze)" stroke="#705018" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="7" fill="#1A1A2E" stroke="url(#brassDark)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3.5" fill="url(#rivet)"/>
  </g>

  <!-- Small gear (top right) -->
  <g transform="translate(465, 95)" filter="url(#mDropShadow)">
    <path d="M 0,-42 L 5,-42 L 6,-35 A 35,35 0 0,1 16,-32 L 21,-39 L 26,-35 L 22,-28 A 35,35 0 0,1 30,-20 L 38,-22 L 40,-16 L 32,-13 A 35,35 0 0,1 34,-2 L 42,-1 L 42,5 L 34,5 A 35,35 0 0,1 31,16 L 38,19 L 37,25 L 29,22 A 35,35 0 0,1 22,30 L 26,37 L 21,40 L 17,34 A 35,35 0 0,1 6,37 L 5,44 L -1,44 L -1,37 A 35,35 0 0,1 -12,34 L -17,41 L -22,37 L -18,30 A 35,35 0 0,1 -27,22 L -34,25 L -36,19 L -29,16 A 35,35 0 0,1 -32,5 L -40,5 L -40,-1 L -32,-2 A 35,35 0 0,1 -30,-14 L -38,-17 L -36,-23 L -28,-20 A 35,35 0 0,1 -20,-30 L -24,-38 L -19,-41 L -14,-34 A 35,35 0 0,1 -4,-36 Z"
          fill="url(#gearFace)" stroke="#705018" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="24" fill="#1A1A2E" stroke="url(#brassDark)" stroke-width="2"/>
    <g fill="url(#brass)" stroke="#705018" stroke-width="0.4">
      <rect x="-3" y="-22" width="6" height="44" rx="1.5"/>
      <rect x="-3" y="-22" width="6" height="44" rx="1.5" transform="rotate(60)"/>
    </g>
    <circle cx="0" cy="0" r="9" fill="url(#bronze)" stroke="#705018" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="url(#rivet)"/>
  </g>

  <!-- Lever mechanism -->
  <g filter="url(#mDropShadow)">
    <!-- Lever base plate -->
    <rect x="80" y="270" width="120" height="16" rx="3" fill="url(#bronze)" stroke="#705018" stroke-width="1"/>
    <!-- Lever slot -->
    <rect x="100" y="274" width="80" height="8" rx="4" fill="#12122a" stroke="#604010" stroke-width="0.5"/>
    <!-- Lever arm -->
    <line x1="140" y1="278" x2="110" y2="210" stroke="url(#brass)" stroke-width="6" stroke-linecap="round"/>
    <!-- Lever handle -->
    <circle cx="110" cy="210" r="10" fill="url(#bronze)" stroke="#705018" stroke-width="1.5"/>
    <circle cx="110" cy="210" r="5" fill="url(#rivet)"/>
    <!-- Pivot -->
    <circle cx="140" cy="278" r="6" fill="url(#bronze)" stroke="#705018" stroke-width="1"/>
    <circle cx="140" cy="278" r="3" fill="url(#rivet)"/>
  </g>

  <!-- Connecting rod from lever to gears -->
  <line x1="140" y1="278" x2="220" y2="260" stroke="url(#brass)" stroke-width="4" stroke-linecap="round" filter="url(#mDropShadow)"/>
  <circle cx="220" cy="260" r="4" fill="url(#rivet)"/>

  <!-- Pipe/tube decorations -->
  <g filter="url(#mDropShadow)">
    <!-- Horizontal pipe -->
    <rect x="430" y="240" width="180" height="12" rx="6" fill="url(#bronze)" stroke="#705018" stroke-width="0.8"/>
    <rect x="430" y="243" width="180" height="3" fill="#e8c460" opacity="0.3"/>
    <!-- Pipe joints -->
    <rect x="450" y="237" width="16" height="18" rx="2" fill="url(#brass)" stroke="#705018" stroke-width="0.8"/>
    <rect x="550" y="237" width="16" height="18" rx="2" fill="url(#brass)" stroke="#705018" stroke-width="0.8"/>
    <!-- Vertical pipe -->
    <rect x="458" y="250" width="10" height="80" rx="5" fill="url(#bronze)" stroke="#705018" stroke-width="0.8"/>
    <rect x="460" y="250" width="3" height="80" fill="#e8c460" opacity="0.25"/>
  </g>

  <!-- Corner rivets -->
  <g>
    <!-- Top-left -->
    <circle cx="20" cy="20" r="5" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>
    <circle cx="20" cy="20" r="2" fill="#f0d080" opacity="0.6"/>
    <circle cx="50" cy="20" r="4" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>
    <circle cx="20" cy="50" r="4" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>

    <!-- Top-right -->
    <circle cx="620" cy="20" r="5" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>
    <circle cx="620" cy="20" r="2" fill="#f0d080" opacity="0.6"/>
    <circle cx="590" cy="20" r="4" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>
    <circle cx="620" cy="50" r="4" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>

    <!-- Bottom-left -->
    <circle cx="20" cy="340" r="5" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>
    <circle cx="20" cy="340" r="2" fill="#f0d080" opacity="0.6"/>
    <circle cx="50" cy="340" r="4" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>
    <circle cx="20" cy="310" r="4" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>

    <!-- Bottom-right -->
    <circle cx="620" cy="340" r="5" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>
    <circle cx="620" cy="340" r="2" fill="#f0d080" opacity="0.6"/>
    <circle cx="590" cy="340" r="4" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>
    <circle cx="620" cy="310" r="4" fill="url(#rivet)" stroke="#604010" stroke-width="0.5"/>
  </g>

  <!-- Corner decorative brackets -->
  <g stroke="url(#brass)" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 10,60 L 10,10 L 60,10"/>
    <path d="M 580,10 L 630,10 L 630,60"/>
    <path d="M 10,300 L 10,350 L 60,350"/>
    <path d="M 580,350 L 630,350 L 630,300"/>
  </g>

  <!-- Golden light source glow -->
  <circle cx="300" cy="140" r="120" fill="url(#goldenGlow)" opacity="0.15" filter="url(#mSoftGlow)"/>

  <!-- Gear highlight reflections -->
  <ellipse cx="195" cy="130" rx="30" ry="8" fill="#ffd54f" opacity="0.06" transform="rotate(-20 195 130)"/>
  <ellipse cx="365" cy="120" rx="20" ry="5" fill="#ffd54f" opacity="0.06" transform="rotate(-15 365 120)"/>

  <!-- Steam wisps -->
  <g opacity="0.08" fill="none" stroke="#d4a44a" stroke-width="1.5">
    <path d="M 462,245 Q 455,220 460,200 Q 465,185 458,170"/>
    <path d="M 468,245 Q 475,225 470,210 Q 465,195 472,180"/>
  </g>

  <!-- Title text -->
  <text x="320" y="338" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="20" font-weight="700" letter-spacing="14" fill="url(#brass)" opacity="0.6" filter="url(#mTextGlow)">MACHINA</text>
</svg>